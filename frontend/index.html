<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tradewars</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23171a21'/><path d='M6 22 L10 14 L14 18 L20 8 L26 16' stroke='%23ecad0a' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/><path d='M22 8 L26 8 L26 12' stroke='%23ecad0a' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <button class="mobile-menu-btn" id="mobile-menu" aria-label="Menu">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
    <aside class="sidebar" id="sidebar">
      <h1 class="brand">Tradewars</h1>
      <div class="clock" id="clock">60:00</div>
      <div class="controls">
        <label class="duration-field">
          <span class="duration-label">Duration (min)</span>
          <input class="duration-input" id="duration-minutes" type="number" value="12" min="1" max="240" step="1" />
        </label>
        <div class="slots" id="slots"></div>
        <div class="presets">
          <span class="presets-label">Presets</span>
          <div class="presets-buttons">
            <button class="btn btn-secondary preset-btn" id="preset-eco" type="button">Eco</button>
            <button class="btn btn-secondary preset-btn" id="preset-max" type="button">Max</button>
          </div>
        </div>
        <button class="btn btn-primary" id="btn-start">Start</button>
        <button class="btn btn-secondary" id="btn-stop" disabled>Stop</button>
      </div>
      <div class="sidebar-spacer"></div>
      <div class="sidebar-auth" id="sidebar-auth"></div>
      <button class="theme-toggle" id="btn-theme" aria-label="Toggle theme">
        <svg class="theme-icon icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
        </svg>
        <svg class="theme-icon icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
        </svg>
      </button>
    </aside>
    <main id="panels" class="panels"></main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
